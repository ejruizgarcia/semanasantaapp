    <style>
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        .slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
        .pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes popIn {
            0% { transform: scale(0.8) translateY(-20px); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        
        .shimmer-flash {
            animation: ringFlash 3s ease-out forwards;
        }
        .shimmer-flash::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.9), transparent);
            transform: skewX(-20deg);
            animation: shimmerSweep 2s ease-out forwards;
            pointer-events: none;
            z-index: 20;
        }
        @keyframes ringFlash {
            0% { box-shadow: 0 0 0px rgba(245, 158, 11, 0); border-color: transparent; }
            10% { box-shadow: 0 0 20px rgba(245, 158, 11, 0.8); border-color: #fbbf24; }
            100% { box-shadow: 0 0 0px rgba(245, 158, 11, 0); border-color: transparent; }
        }
        @keyframes shimmerSweep {
            0% { left: -100%; }
            100% { left: 200%; }
        }
    </style>
</head>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let userId = null;

        window.saveSortingPreference = async (criteria) => {
            if (!userId) return;
            try {
                const settingsRef = doc(db, 'artifacts', appId, 'users', userId, 'preferences', 'settings');
                await setDoc(settingsRef, { sortingCriteria: criteria }, { merge: true });
            } catch (error) {
                console.error("Error al guardar preferencia:", error);
            }
        };

        async function loadSettings(uid) {
            try {
                const settingsRef = doc(db, 'artifacts', appId, 'users', uid, 'preferences', 'settings');
                const docSnap = await getDoc(settingsRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.sortingCriteria) {
                        window.criterioOrdenActual = data.sortingCriteria;
                        if (typeof window.actualizarUIOrdenacion === 'function') window.actualizarUIOrdenacion();
                        if (typeof window.cargarDia === 'function') window.cargarDia(window.diaSeleccionadoActual);
                    }
                }
            } catch (error) {
                console.error("Error al cargar configuración:", error);
            }
        }

        const initFirebase = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                userId = user.uid;
                await loadSettings(userId);
            }
        });

        initFirebase();
    </script>

        function obtenerTimestampAbsoluto(dia, horaString) {
            let offset = diasOffset[dia];

            setTimeout(() => {

            }, 6000);

        function actualizarProgresoLive(barras) {
            const ahora = Date.now();
            barras.forEach(barra => {
                const inicio = barra.inicioTs;
                const fin = barra.finTs;
                let porcentaje = 0;
                if (ahora >= fin) {
                    porcentaje = 100;
                    barra.boton.classList.add('opacity-40', 'grayscale');
                } else {
                    barra.boton.classList.remove('opacity-40', 'grayscale');
                    if (ahora > inicio) porcentaje = ((ahora - inicio) / (fin - inicio)) * 100;
                }
                barra.elemento.style.width = porcentaje + '%';
                const enCalle = ahora >= barra.salidaTs && ahora < barra.recogidaPasoTs;
                barra.boton.classList.remove('ring-2', 'ring-rose-500', 'border-transparent', 'border-gray-200');
                if (enCalle) barra.boton.classList.add('ring-2', 'ring-rose-500', 'border-transparent');
                else barra.boton.classList.add('border-gray-200');
                const windowMs = 120000; 
                if (!notificados.has(barra.nombre + 'salida') && ahora >= barra.salidaTs && ahora <= barra.salidaTs + windowMs) {

            else if (mes === 2 && fecha === 31) diaInicial = 'martes';
            else if (mes === 3 && fecha === 1) diaInicial = 'miercoles';
            else if (mes === 3 && fecha === 2) diaInicial = 'jueves';
            else if (mes === 3 && fecha === 3) diaInicial = (hora < 7) ? 'madrugada' : 'viernes';
            else if (mes === 3 && fecha === 5) diaInicial = 'resurreccion';
            seleccionarDia(diaInicial);
        };

        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                if (splash) {
                    splash.classList.add('opacity-0');
                    setTimeout(() => splash.classList.add('hidden'), 500);
                }
            }, 1000);
            
            window.startAppFlow();
        });
    </script>
</body>
</html>
